###################### START ####################################

#SET_PRINT_STATS_INFO TOTAL_LAYER=[total_layer_count]

#print_start extruder_temp=[first_layer_temperature] bed_temp=[first_layer_bed_temperature]

[gcode_macro PRINT_START]
gcode:
  {% set BED = params.BED_TEMP|int %}
  {% set EXTRUDER = params.EXTRUDER_TEMP|int %}
  {% set CHAMBER_T = params.CHAMBER_TEMP|int %}
  M117 Ativar filtro nevermore
  SET_FAN_SPEED FAN=nevermore SPEED=0.6
  
  M141 S{CHAMBER_T}
  M140 S{BED}
  M117 HOME
  G28
  G1 X240 Y30 Z25 F2000
  M117 WAIT BED TEMP
  M190 S{BED}  ;Set bed temperature and wait
  
  M117 Wait HOTEND TEMP 170C FOR CLEAN NOZZLE
  M109 S175
  M117 CLEAN NOZZLE
  STATUS_CLEANING
  CLEAN_NOZZLE
  G92 E0
  G1 E-3 F300
  M109 S150
    
  M117 Z_TILT
  STATUS_LEVELING
  Z_TILT_ADJUST  ;Z Tilt adjust
  M117 HOME Z
  G28 Z
  M117 BED MESH
  STATUS_MESHING
  BED_MESH_CLEAR  ;Clear Bed Mesh
  BED_MESH_CALIBRATE ADAPTIVE=1  ;Bed Mesh Calibration Adaptive
  G1 X20 Y30 Z15 F3000
  M117 WAIT HOTEND TEMP
  STATUS_HEATING
  M109 S{EXTRUDER}  ;Set extruder temperature and wait
  STATUS_PRINTING
  M117 START PRINT
  
  #### PURGA  ####
  G92 E0 ; Reinicia a posição do extrusor
  G1 E5 F300
  G1 Z2.0 F3000 ; Sobe o bico para não raspar na mesa
  G1 X20 Y5 Z2 F5000.0 ; Vai para a posição inicial (frente esquerda)
  G1 Z0.6 F2000
  G1 X80 Y5 Z0.5 F1000.0 E30 ; Faz a linha grossa: anda apenas 60mm (X20 a X80) e injeta bastante filamento (E15)
  G92 E0 ; Reinicia o extrusor novamente
  G1 Z2.0 F3000 ; Sobe o bico antes de ir para a peça

###### END 
  

[gcode_macro PRINT_END]
gcode:
    SAVE_GCODE_STATE NAME=STATE_PRINT_END MOVE=0
    
    {% set th = printer.toolhead %}
    {% set x_safe = th.position.x + 20 * (1 if th.axis_maximum.x - th.position.x > 20 else -1) %}
    {% set y_safe = th.position.y + 20 * (1 if th.axis_maximum.y - th.position.y > 20 else -1) %}
    {% set z_safe = [th.position.z + 2, th.axis_maximum.z]|min %}
    
    M400                           ; wait for buffer to clear
    G92 E0                         ; zero the extruder
    G1 E-4.0 F3600                 ; retract filament
    
    TURN_OFF_HEATERS
    
    G90                                      ; absolute positioning
    G0 X{x_safe} Y{y_safe} Z{z_safe} F20000  ; move nozzle to remove stringing
    G0 X{th.axis_maximum.x - 2} Y{th.axis_maximum.y - 2} F3600  ; park nozzle at rear
    
    M107                                     ; turn off fan
    BED_MESH_CLEAR
    M117 Finalizando...
    
    UPDATE_DELAYED_GCODE ID=delayed_nevermore_off DURATION=300 # Desliga após 5 min (300 seg)
    
[delayed_gcode delayed_nevermore_off]
gcode:
    M117 Desligando NEVERMORE
    NEVERMORE_OFF



############################### MACROS ###############################################################

[gcode_macro M141]
gcode:
    {% set s = params.S|default(0)|float %}
    SET_TEMPERATURE_FAN_TARGET temperature_fan="chamber" target={s}
    
    
    #gcode: SET_TEMPERATURE_FAN_TARGET temperature_fan="chamber" target={params.S|default(0)|float}

[fan_generic nevermore]
pin: PD15  # porta da fan
cycle_time: 0.01
hardware_pwm: True
shutdown_speed: 0
kick_start_time: 1.0

[gcode_macro SET_NEVERMORE]
gcode:
    {% set speed = params.SPEED|default(1)|float %}
    SET_FAN_SPEED FAN=nevermore SPEED={speed}

[gcode_macro NEVERMORE_ON]
gcode:
    SET_FAN_SPEED FAN=nevermore SPEED=1

[gcode_macro NEVERMORE_OFF]
gcode:
    SET_FAN_SPEED FAN=nevermore SPEED=0
    
    


##################### Z TILT ##########################
[z_tilt]

z_positions:
    -50, 18
    126, 298
    300, 18
points:
    30, 30
    126, 220
    220, 30

speed: 200
horizontal_move_z: 10
retries: 5
retry_tolerance: 0.0075



#################### BED MESH ##############################################################
[bed_mesh]
speed: 300
horizontal_move_z: 5
mesh_min:  30 , 30   
mesh_max: 220, 220 # 225,225
fade_start: 0.6
fade_end: 10.0
probe_count: 5,5
algorithm: bicubic
adaptive_margin: 10
mesh_pps: 2, 2
zero_reference_position: 126,126

      

    
############################ CLEAN NOZZLE ####################################################
[gcode_macro CLEAN_NOZZLE]
variable_start_x: 80
variable_start_y: 256
variable_start_z: 15
variable_wipe_dist: -50
variable_wipe_qty: 8
variable_wipe_spd: 100
variable_raise_distance: 10

gcode:
   {% if "xyz" not in printer.toolhead.homed_axes %}
   G28
 {% endif %}
 
 G90                                            ; absolute positioning
 ## Move nozzle to start position
 G1 X{start_x} Y{start_y} F6000
 G1 Z{start_z} F1500

 ## Wipe nozzle
 {% for wipes in range(1, (wipe_qty + 1)) %}
   G1 X{start_x + wipe_dist}  F{wipe_spd * 60} ; 220-50x258
   G1 X{start_x} F{wipe_spd * 60}                        ; 220x258
  
   
 {% endfor %}
 ## Raise nozzle
 G1 Z{raise_distance}




############################# M600 ######################################

[gcode_macro M600]
gcode:
    {% set X = params.X|default(10)|float %}
    {% set Y = params.Y|default(10)|float %}
    {% set Z = params.Z|default(15)|float %}
    SAVE_GCODE_STATE NAME=M600_state
    PAUSE
    G91
    G1 E-.8 F2700
    G1 Z{Z}
    G90
    G1 X{X} Y{Y} F3000
    G91
    G1 E-50 F1000
    RESTORE_GCODE_STATE NAME=M600_state
    


#######################  FILAMENTO #####################################

[gcode_macro LOAD_FILAMENT]
variable_load_distance: 15         # Distance to load filament into the extruder
variable_purge_distance: 60        # Distance to purge filament after loading
variable_nozzle_preheat_temp: 240  # Default preheat temperature for the nozzle
variable_turn_off_extruder: False   # Option to turn off the extruder after loading (True/False)
gcode:
    # Parameters and settings
    {% set load_speed = params.LOAD_SPEED|default(600) %}  # Speed in mm/min for fast filament loading
    {% set purge_speed = params.PURGE_SPEED|default(300) %}  # Speed in mm/min for purging filament
    {% set target_temp = params.TARGET_TEMP|default(nozzle_preheat_temp) %}  # Target temperature for the nozzle
    {% set min_temp = params.MIN_TEMP|default(180) %}  # Minimum safe temperature for extrusion

    # Save current state of the printer
    SAVE_GCODE_STATE NAME=load_state

    # Heat directly to the target temperature if it's above the minimum temperature
    {% if target_temp >= min_temp %}
        M104 S{target_temp} ; Set extruder to target temperature
        M109 S{target_temp} ; Wait for extruder to reach target temperature
    {% else %}
        # Heat to minimum temperature first if target is too low
        M104 S{min_temp} ; Set extruder to safe minimum temperature
        M109 S{min_temp} ; Wait for extruder to reach safe minimum temperature
    {% endif %}

    # Begin filament loading process
    G91 ; Set relative positioning for extrusion
    G92 E0 ; Reset extruder position
    G1 E{load_distance} F{load_speed} ; Load filament at the specified loading speed
    G1 E{purge_distance} F{purge_speed} ; Purge filament at the slower purging speed

    # Optionally turn off the extruder heater after loading
    {% if turn_off_extruder %}
        M104 S0 ; Turn off extruder heater
    {% endif %}

    # Restore previous state of the printer
    G90 ; Restore absolute positioning
    RESTORE_GCODE_STATE NAME=load_state

    # Completion message
    M117 Filament load complete

###########################################################################################################################################################################

[gcode_macro UNLOAD_FILAMENT]
variable_unload_distance: 100      # Distance to retract filament from the extruder
variable_nozzle_preheat_temp: 240  # Default preheat temperature for unloading
variable_turn_off_extruder: False   # Option to turn off the extruder after unloading (True/False)
gcode:
    # Parameters and settings
    {% set retract_speed = params.RETRACT_SPEED|default(600) %}  # Speed for retracting filament
    {% set target_temp = params.TARGET_TEMP|default(nozzle_preheat_temp) %}  # Target temperature for the nozzle
    {% set min_temp = params.MIN_TEMP|default(180) %}  # Minimum safe temperature for extrusion

    # Save current state of the printer
    SAVE_GCODE_STATE NAME=unload_state

    # Heat the nozzle to the target temperature if required
    {% if printer.extruder.temperature < target_temp %}
        # Ensure the nozzle is heated to the target temperature or at least the minimum safe temperature
        {% if target_temp >= min_temp %}
            M104 S{target_temp} ; Set extruder to target temperature
            M109 S{target_temp} ; Wait for extruder to reach target temperature
        {% else %}
            M104 S{min_temp} ; Set extruder to safe minimum temperature
            M109 S{min_temp} ; Wait for extruder to reach safe minimum temperature
        {% endif %}
    {% endif %}

    # Begin filament unloading process
    G91 ; Set relative positioning for extrusion
    G92 E0 ; Reset extruder position
    G1 E20 F200
    G1 E-{unload_distance} F{retract_speed} ; Retract filament at the specified speed

    # Optionally turn off the extruder heater after unloading
    {% if turn_off_extruder %}
        M104 S0 ; Turn off extruder heater
    {% endif %}

    # Restore previous state of the printer
    G90 ; Restore absolute positioning
    RESTORE_GCODE_STATE NAME=unload_state

    # Completion message
    M117 Filament unload complete

