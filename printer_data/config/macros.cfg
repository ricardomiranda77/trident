[gcode_macro CUT_FILAMENT]

gcode:
    # --- CONFIGURAÇÕES DO USUÁRIO ---
    {% set PIN_X = 17 %}               # Coordenada X de aproximação (ao lado do pino)
    {% set PIN_Y = 256 %}              # Coordenada Y onde a cabeça se alinha ao pino
    {% set CUT_X = 0 %}               # Coordenada X final do corte (empurrando o pino)
    
    {% set RETRACT_DIST = 15 %}        # Quantos mm recuar o filamento após o corte
    # ---------------------------------

    SAVE_GCODE_STATE NAME=cut_filament_state
    
    # 1. Garante posicionamento absoluto
    G90 
    
    # 2. Move rapidamente para a posição Y do pino, mantendo o X seguro fora do caminho
    G1 Y{PIN_Y} F12000
    
    # 3. Alinha no X inicial de aproximação
    G1 X{PIN_X} F12000
    
    # 4. Movimento rápido de corte (Impacto lateral contra o pino)
    G1 X{CUT_X} F6000
    
    # 5. Retorno rápido para a posição inicial para liberar a mola do cortador
    G1 X{PIN_X} F12000
    
    # 6. Retração imediata do filamento para tirá-lo da zona da lâmina
    G91
    G1 E-{RETRACT_DIST} F3000
    G90

    RESTORE_GCODE_STATE NAME=cut_filament_state

    