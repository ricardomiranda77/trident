



[include mainsail.cfg]
[include stealthburner_leds.cfg]
[include test_speed.cfg]
[include KAMP_Settings.cfg]
[include macros.cfg]

# Enable object exclusion
[exclude_object]




[mcu]
serial: /dev/ttyAMA0
restart_method: command

[virtual_sdcard]
path: /home/miranda/printer_data/gcodes
on_error_gcode: CANCEL_PRINT

[printer]
kinematics: corexy
max_velocity: 500  
max_accel: 10000             #Max 4000
max_z_velocity: 15       #Max 15 for 12V TMC Drivers, can increase for 24V
max_z_accel: 250
square_corner_velocity: 12.0



[idle_timeout]
timeout: 1800 # 30 minutos
gcode:
    {% if printer.pause_resume.is_paused %}
        M117 Idle mas pausado, mantendo aquecedores.
    {% else %}
        TURN_OFF_HEATERS
        M84
        SET_FAN_SPEED FAN=nevermore SPEED=0
    {% endif %}

[firmware_retraction]
retract_length: 0.5      # Distância de retração
retract_speed: 35        # Velocidade de retração
unretract_speed: 35      # Velocidade de retorno

[filament_switch_sensor sensor_filamento]
pause_on_runout: True
switch_pin: EBBCan: PB6


#####################################################################
#   X/Y Stepper Settings
#####################################################################

##  B Stepper - Left
##  Connected to MOTOR_0
##  Endstop connected to DIAG_0
[stepper_x]
step_pin: PF13
dir_pin: PF12
enable_pin: !PF14
rotation_distance: 40
microsteps: 64
endstop_pin: EBBCan: PB7 #PG6 # J27
position_min: -10
position_endstop: 254
position_max: 254
homing_speed: 40   #Max 100
homing_positive_dir: true
homing_retract_dist: 5



[tmc2240 stepper_x]
cs_pin: PC4           # Chip select exclusivo para o X
spi_software_mosi_pin: PA7
spi_software_miso_pin: PA6
spi_software_sclk_pin: PA5
interpolate: false
run_current: 0.850
#hold_current: 0.6
stealthchop_threshold: 0



##  A Stepper - Right
##  Connected to MOTOR_1
##  Endstop connected to DIAG_1
[stepper_y]
step_pin: PG0
dir_pin: PG1
enable_pin: !PF15
rotation_distance: 40
microsteps: 64
endstop_pin: PG9 #PG9 # J29
position_min: 0
position_endstop: 256
position_max: 256
homing_speed: 40  #Max 100
homing_positive_dir: true
homing_retract_dist: 5

[tmc2240 stepper_y]
cs_pin: PD11         # Chip select exclusivo para o Y
spi_software_mosi_pin: PA7
spi_software_miso_pin: PA6
spi_software_sclk_pin: PA5
interpolate: false
run_current: 0.850
#hold_current: 0.6
stealthchop_threshold: 0



#####################################################################
#   Z Stepper Settings
#####################################################################

##  Z0 Stepper - Front Left
##  Connected to MOTOR_2
##  Endstop connected to DIAG_2
[stepper_z]
step_pin: PF11
dir_pin: PG3
enable_pin: !PG5
rotation_distance: 4   
microsteps: 32
endstop_pin: probe:z_virtual_endstop
position_max: 250
position_min: -5.0
homing_speed: 10.0 
second_homing_speed: 3
homing_retract_dist: 2

##  Make sure to update below for your relevant driver (2208 or 2209)
[tmc2209 stepper_z]
uart_pin: PC6
interpolate: false
run_current: 0.650
sense_resistor: 0.100
stealthchop_threshold: 99999

##  Z1 Stepper - Rear Center
##  Connected to MOTOR_3
[stepper_z1]
step_pin: PG4
dir_pin: PC1
enable_pin: !PA0
rotation_distance: 4
microsteps: 32

##  Make sure to update below for your relevant driver (2208 or 2209)
[tmc2209 stepper_z1]
uart_pin: PC7
interpolate: false
run_current: 0.650
sense_resistor: 0.100
stealthchop_threshold: 99999

##  Z2 Stepper - Front Right
##  Connected to MOTOR_4
[stepper_z2]
step_pin: PF9
dir_pin: PF10
enable_pin: !PG2
rotation_distance: 4  
microsteps: 32

##  Make sure to update below for your relevant driver (2208 or 2209)
[tmc2209 stepper_z2]
uart_pin: PF2
interpolate: false
run_current: 0.650
sense_resistor: 0.100
stealthchop_threshold: 99999


#####################################################################
#   Bed Heater
#####################################################################

[heater_bed]
heater_pin: PA1 # BED_OUT
sensor_type: Generic 3950
sensor_pin: PF3 # J44
max_power: 1
smooth_time: 3.0
pwm_cycle_time: 0.0166 ; 60hz
min_temp: 0
max_temp: 120

[verify_heater heater_bed]
max_error: 120
check_gain_time: 60 # Mesa 24V demora mais que AC para detectar erro
hysteresis: 5
heating_gain: 1
#[temperature_sensor mesa]
#sensor_type: Generic 3950
#sensor_pin: PF6 # J48
#min_temp: 0
#max_temp: 120

#####################################################################
#   Probe
#####################################################################

[probe]
pin:  EBBCan: PB8 # PG10 # J31
x_offset: 0
y_offset: 0
#z_offset: 0
speed: 3
lift_speed: 10
samples: 2
samples_result: median
sample_retract_dist: 3.0
samples_tolerance: 0.01
samples_tolerance_retries: 3

activate_gcode:
    {% set PROBE_TEMP = 150 %}
    {% set MAX_TEMP = PROBE_TEMP + 5 %}
    {% set ACTUAL_TEMP = printer.extruder.temperature %}
    {% set TARGET_TEMP = printer.extruder.target %}
    
    {% if TARGET_TEMP > PROBE_TEMP %}
    { action_respond_info('Extruder temperature target of %.1fC is too high, lowering to %.1fC' % (TARGET_TEMP, PROBE_TEMP)) }
    M109 S{ PROBE_TEMP }
    {% else %}
    # Temperature target is already low enough, but nozzle may still be too hot.
    {% if ACTUAL_TEMP > MAX_TEMP %}
    { action_respond_info('Extruder temperature %.1fC is still too high, waiting until below %.1fC' % (ACTUAL_TEMP, MAX_TEMP)) }
    TEMPERATURE_WAIT SENSOR=extruder MAXIMUM={ MAX_TEMP }
    {% endif %}
    {% endif %}
    
    ################################## HOMING ###########
[safe_z_home]
##  XY Location of the Z Endstop Switch
##  Update -10,-10 to the XY coordinates of your endstop pin 
##  (such as 157,305) after going through Z Endstop Pin
##  Location Definition step.
home_xy_position: 126,126
speed:200
z_hop:15

############################################ CANBUS #################################################

[mcu EBBCan]
canbus_uuid: 572b671f3347


[adxl345]
cs_pin: EBBCan: PB12
spi_software_sclk_pin: EBBCan: PB10
spi_software_mosi_pin: EBBCan: PB11
spi_software_miso_pin: EBBCan: PB2
axes_map: x,y,z

[resonance_tester]
accel_chip:adxl345
probe_points:
    126,126,20
    
    
[extruder]
step_pin: EBBCan: PD0
dir_pin: !EBBCan: PD1
enable_pin: !EBBCan: PD2
microsteps: 16
rotation_distance: 22.42053 #22.647  #Bondtech 5mm Drive Gears
gear_ratio: 50:10
nozzle_diameter: 0.400
filament_diameter: 1.750
heater_pin: EBBCan: PB13
sensor_type: ATC Semitec 104NT-4-R025H42G ## Generic 3950 ##
sensor_pin: EBBCan: PA3
min_temp: 1
max_temp: 300
min_extrude_temp: 170
max_extrude_cross_section: 50
max_extrude_only_distance: 700
#control = pid
#pid_kp = 38.432
#pid_ki = 12.201
#pid_kd = 30.265

[tmc2209 extruder]
uart_pin: EBBCan: PA15
run_current: 0.550
stealthchop_threshold: 0
interpolate: false
sense_resistor: 0.11

[verify_heater extruder]
max_error: 200
check_gain_time: 20
hysteresis: 5
heating_gain: 2

   
#####################################################################
#   Fan/Temp Control
#####################################################################

[fan] # fan de resfriamento da peça
pin: EBBCan: PA0
kick_start_time: 0.5
#off_below: 0.10

[heater_fan hotend_fan]
##  Hotend Fan - FAN1
pin: EBBCan: PA1
max_power: 1.0
kick_start_time: 0.5
heater: extruder
heater_temp: 50.0

[controller_fan controller_fan]
##  Controller fan - FAN2
pin: PD12 # J52
kick_start_time: 0.5
heater: heater_bed
max_power: 0.8
shutdown_speed: 0.0


#[temperature_sensor Octopus]
#sensor_type: temperature_mcu
#min_temp: 0
#max_temp: 100

[temperature_sensor Toolhead]
sensor_type: temperature_mcu
sensor_mcu: EBBCan
min_temp: 0
max_temp: 100

[temperature_fan _Rasp_Fan]
pin: PD14          # Mude para o pino onde o cooler está conectado
sensor_type: temperature_host
control: watermark         
target_temp: 55.0          # Temperatura alvo para ligar o cooler
max_delta: 5.0             
min_temp: 0
max_temp: 100
max_power: 0.6
shutdown_speed: 0.0

[temperature_fan chamber]
pin: PD13 # J53
max_power: 1.0
shutdown_speed: 0.0
kick_start_time: 5.0
cycle_time: 0.01
#off_below: 0.1
control: watermark
target_temp: 60.0
sensor_type: Generic 3950
sensor_pin: PF4 
min_temp: 0
max_temp: 70
gcode_id: C

[gcode_macro M141]
gcode:
    {% set s = params.S|default(0)|float %}
    SET_TEMPERATURE_FAN_TARGET temperature_fan="chamber" target={s}
    
    
    #gcode: SET_TEMPERATURE_FAN_TARGET temperature_fan="chamber" target={params.S|default(0)|float}

[fan_generic nevermore]
pin: PD15  # porta da fan
cycle_time: 0.01
hardware_pwm: True
shutdown_speed: 0
kick_start_time: 1.0

[gcode_macro SET_NEVERMORE]
gcode:
    {% set speed = params.SPEED|default(1)|float %}
    SET_FAN_SPEED FAN=nevermore SPEED={speed}

[gcode_macro NEVERMORE_ON]
gcode:
    SET_FAN_SPEED FAN=nevermore SPEED=1

[gcode_macro NEVERMORE_OFF]
gcode:
    SET_FAN_SPEED FAN=nevermore SPEED=0
    
    
[output_pin caselight]
pin: PA3 # HE1
pwm:true
shutdown_value: 0
value:1
cycle_time: 0.005
#pwm_cycle_time: 0.0166 ; 60hz


